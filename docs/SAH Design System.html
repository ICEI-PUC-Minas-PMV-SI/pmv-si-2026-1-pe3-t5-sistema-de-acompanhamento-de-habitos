<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>SAH · Design System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body { margin: 0; padding: 0; background: #FAF7F2; font-family: "Inter Tight", -apple-system, system-ui, sans-serif; }
    #root { min-height: 100vh; }
    html { scroll-behavior: smooth; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">
// ─── Design System SAH — tokens, primitivas, ilustrações ──────────────────────

const SAH = {
  colors: {
    bg: '#FAF7F2',
    bgAlt: '#F4F0E8',
    surface: '#FFFFFF',
    surfaceAlt: '#FBF8F3',
    border: 'rgba(60, 50, 40, 0.08)',
    borderStrong: 'rgba(60, 50, 40, 0.16)',
    text: '#2A2622',
    textMuted: '#6B655D',
    textFaint: '#9B958B',
    primary: '#4A7C59',
    primaryHover: '#3E6B4C',
    primarySoft: '#DCEAE0',
    primaryFaint: '#EEF5F0',
    accent: '#6B5B95',
    accentHover: '#584A7E',
    accentSoft: '#E5E0ED',
    accentFaint: '#F2EFF5',
    streak: '#C89B3C',
    streakSoft: '#F4E8CC',
    success: '#4A7C59',
    warning: '#C89B3C',
    danger: '#B8544A',
    dangerSoft: '#F2DAD7',
    info: '#5B7FA8',
    infoSoft: '#DCE5F0',
  },
  radius: { sm: 6, md: 10, lg: 14, xl: 20, full: 999 },
  shadow: {
    sm: '0 1px 2px rgba(40, 30, 20, 0.04), 0 1px 3px rgba(40, 30, 20, 0.06)',
    md: '0 2px 4px rgba(40, 30, 20, 0.04), 0 8px 24px rgba(40, 30, 20, 0.08)',
    lg: '0 4px 8px rgba(40, 30, 20, 0.06), 0 16px 48px rgba(40, 30, 20, 0.12)',
    focus: '0 0 0 3px rgba(74, 124, 89, 0.2)',
  },
  font: {
    display: '"General Sans", "Inter Tight", -apple-system, sans-serif',
    body: '"Inter Tight", -apple-system, "Segoe UI", sans-serif',
    mono: '"JetBrains Mono", ui-monospace, monospace',
  },
};

if (typeof document !== 'undefined' && !document.getElementById('sah-styles')) {
  const style = document.createElement('style');
  style.id = 'sah-styles';
  style.textContent = `
    @import url('https://api.fontshare.com/v2/css?f[]=general-sans@500,600,700&f[]=inter-tight@400,500,600&display=swap');
    .sah-app { font-family: ${SAH.font.body}; color: ${SAH.colors.text}; line-height: 1.5; letter-spacing: -0.005em; }
    .sah-app * { box-sizing: border-box; }
    .sah-app h1, .sah-app h2, .sah-app h3, .sah-app h4 { font-family: ${SAH.font.display}; font-weight: 600; letter-spacing: -0.02em; margin: 0; }
    .sah-app button { font-family: inherit; cursor: pointer; border: none; background: none; }
    .sah-app input, .sah-app textarea, .sah-app select { font-family: inherit; }
    .sah-num { font-variant-numeric: tabular-nums; }
    @keyframes sah-spin { to { transform: rotate(360deg); } }
    @keyframes sah-pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    @keyframes sah-bounce-in { 0% { transform: scale(0.8); opacity: 0; } 60% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); } }
    @keyframes sah-slide-up { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes sah-shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes sah-confetti-fall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100px) rotate(360deg); opacity: 0; } }
    .sah-fade-in { animation: sah-slide-up 0.3s cubic-bezier(0.2, 0.8, 0.3, 1); }
    .sah-bounce-in { animation: sah-bounce-in 0.4s cubic-bezier(0.2, 0.8, 0.3, 1); }
    .sah-skeleton { background: linear-gradient(90deg, ${SAH.colors.bgAlt} 25%, ${SAH.colors.surfaceAlt} 50%, ${SAH.colors.bgAlt} 75%); background-size: 200% 100%; animation: sah-shimmer 1.4s infinite; border-radius: 6px; }
    .sah-focus-ring:focus-visible { outline: none; box-shadow: ${SAH.shadow.focus}; }
  `;
  document.head.appendChild(style);
}

// ─── Primitivas ───────────────────────────────────────────────────────────────

function Button({ variant = 'primary', size = 'md', children, icon, iconRight, fullWidth, disabled, loading, onClick, style, type = 'button' }) {
  const base = {
    display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8,
    fontWeight: 500, letterSpacing: '-0.005em',
    borderRadius: SAH.radius.md, transition: 'all 0.15s ease',
    width: fullWidth ? '100%' : 'auto',
    opacity: disabled || loading ? 0.55 : 1,
    cursor: disabled || loading ? 'not-allowed' : 'pointer',
  };
  const sizes = {
    sm: { padding: '6px 12px', fontSize: 13, minHeight: 30 },
    md: { padding: '10px 18px', fontSize: 14, minHeight: 40 },
    lg: { padding: '14px 24px', fontSize: 15, minHeight: 48 },
  };
  const variants = {
    primary: { background: SAH.colors.primary, color: '#fff' },
    accent: { background: SAH.colors.accent, color: '#fff' },
    secondary: { background: SAH.colors.surface, color: SAH.colors.text, boxShadow: `inset 0 0 0 1px ${SAH.colors.borderStrong}` },
    ghost: { background: 'transparent', color: SAH.colors.textMuted },
    danger: { background: SAH.colors.danger, color: '#fff' },
    dangerGhost: { background: 'transparent', color: SAH.colors.danger, boxShadow: `inset 0 0 0 1px ${SAH.colors.dangerSoft}` },
  };
  const [hover, setHover] = React.useState(false);
  const hoverStyle = hover && !disabled && !loading ? {
    primary: { background: SAH.colors.primaryHover },
    accent: { background: SAH.colors.accentHover },
    secondary: { background: SAH.colors.bgAlt },
    ghost: { background: SAH.colors.bgAlt, color: SAH.colors.text },
    danger: { background: '#A04840' },
    dangerGhost: { background: SAH.colors.dangerSoft },
  }[variant] : {};

  return (
    <button type={type} onClick={onClick} disabled={disabled || loading}
      className="sah-focus-ring"
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{ ...base, ...sizes[size], ...variants[variant], ...hoverStyle, ...style }}>
      {loading ? <Spinner size={size === 'sm' ? 12 : 14} color={variant === 'primary' || variant === 'accent' || variant === 'danger' ? '#fff' : SAH.colors.text} /> : icon}
      {children}
      {iconRight}
    </button>
  );
}

function Input({ label, type = 'text', value, onChange, placeholder, error, hint, icon, rightSlot, id, autoFocus }) {
  const [focused, setFocused] = React.useState(false);
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 6, width: '100%' }}>
      {label && <label htmlFor={id} style={{ fontSize: 13, fontWeight: 500, color: SAH.colors.textMuted }}>{label}</label>}
      <div style={{
        display: 'flex', alignItems: 'center', gap: 8,
        background: SAH.colors.surface,
        borderRadius: SAH.radius.md,
        boxShadow: error
          ? `inset 0 0 0 1.5px ${SAH.colors.danger}`
          : focused
          ? `inset 0 0 0 1.5px ${SAH.colors.primary}, ${SAH.shadow.focus}`
          : `inset 0 0 0 1px ${SAH.colors.borderStrong}`,
        padding: '0 14px',
        transition: 'box-shadow 0.15s',
      }}>
        {icon && <span style={{ color: SAH.colors.textFaint, display: 'flex' }}>{icon}</span>}
        <input id={id} type={type} value={value} autoFocus={autoFocus}
          onChange={(e) => onChange && onChange(e.target.value)}
          onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}
          placeholder={placeholder}
          style={{ flex: 1, border: 'none', outline: 'none', background: 'transparent', padding: '12px 0', fontSize: 14, color: SAH.colors.text, minWidth: 0 }} />
        {rightSlot}
      </div>
      {(error || hint) && (
        <div style={{ fontSize: 12, color: error ? SAH.colors.danger : SAH.colors.textFaint, display: 'flex', alignItems: 'center', gap: 4 }}>
          {error && <Icon name="alert" size={12} />}
          {error || hint}
        </div>
      )}
    </div>
  );
}

function Card({ children, padding = 20, style, hover, onClick }) {
  const [h, setH] = React.useState(false);
  return (
    <div onClick={onClick}
      onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
      style={{
        background: SAH.colors.surface,
        borderRadius: SAH.radius.lg,
        padding,
        boxShadow: h && hover ? SAH.shadow.md : SAH.shadow.sm,
        transform: h && hover ? 'translateY(-1px)' : 'none',
        transition: 'all 0.2s cubic-bezier(0.2, 0.8, 0.3, 1)',
        cursor: onClick ? 'pointer' : 'default',
        ...style,
      }}>
      {children}
    </div>
  );
}

function Badge({ variant = 'neutral', children, size = 'md', dot }) {
  const variants = {
    neutral: { bg: SAH.colors.bgAlt, fg: SAH.colors.textMuted, dot: SAH.colors.textFaint },
    success: { bg: SAH.colors.primarySoft, fg: SAH.colors.primary, dot: SAH.colors.primary },
    warning: { bg: SAH.colors.streakSoft, fg: '#8A6820', dot: SAH.colors.streak },
    danger: { bg: SAH.colors.dangerSoft, fg: SAH.colors.danger, dot: SAH.colors.danger },
    accent: { bg: SAH.colors.accentSoft, fg: SAH.colors.accent, dot: SAH.colors.accent },
    info: { bg: SAH.colors.infoSoft, fg: SAH.colors.info, dot: SAH.colors.info },
  };
  const v = variants[variant];
  const sizes = { sm: { padding: '2px 8px', fontSize: 11 }, md: { padding: '3px 10px', fontSize: 12 } };
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      background: v.bg, color: v.fg,
      borderRadius: SAH.radius.full, fontWeight: 500,
      ...sizes[size],
    }}>
      {dot && <span style={{ width: 6, height: 6, borderRadius: 3, background: v.dot }} />}
      {children}
    </span>
  );
}

function Spinner({ size = 16, color = SAH.colors.primary }) {
  return (
    <span style={{
      display: 'inline-block', width: size, height: size,
      border: `2px solid ${color}30`, borderTopColor: color, borderRadius: '50%',
      animation: 'sah-spin 0.7s linear infinite',
    }} />
  );
}

function ProgressBar({ value, max = 100, color = SAH.colors.primary, height = 6 }) {
  const pct = Math.max(0, Math.min(100, (value / max) * 100));
  return (
    <div style={{ width: '100%', height, background: SAH.colors.bgAlt, borderRadius: height / 2, overflow: 'hidden' }}>
      <div style={{ width: `${pct}%`, height: '100%', background: color, borderRadius: height / 2, transition: 'width 0.5s cubic-bezier(0.2, 0.8, 0.3, 1)' }} />
    </div>
  );
}

function Icon({ name, size = 16, color = 'currentColor', style }) {
  const paths = {
    mail: <path d="M3 6l9 6 9-6M3 6v12a1 1 0 001 1h16a1 1 0 001-1V6M3 6a1 1 0 011-1h16a1 1 0 011 1" />,
    lock: <><rect x="4" y="11" width="16" height="10" rx="2" /><path d="M8 11V7a4 4 0 018 0v4" /></>,
    user: <><circle cx="12" cy="8" r="4" /><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8" /></>,
    eye: <><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z" /><circle cx="12" cy="12" r="3" /></>,
    eyeOff: <><path d="M17 17A10 10 0 0112 19c-6.5 0-10-7-10-7a19 19 0 014.1-5.1M9.9 5.1A10 10 0 0112 5c6.5 0 10 7 10 7a19 19 0 01-2.1 3.1M14.1 14.1A3 3 0 019.9 9.9M2 2l20 20" /></>,
    arrow: <path d="M5 12h14M13 5l7 7-7 7" />,
    arrowLeft: <path d="M19 12H5M11 19l-7-7 7-7" />,
    chevron: <path d="M6 9l6 6 6-6" />,
    chevronRight: <path d="M9 6l6 6-6 6" />,
    alert: <><circle cx="12" cy="12" r="10" /><path d="M12 8v4M12 16h.01" /></>,
    check: <path d="M5 12l5 5L20 7" />,
    close: <path d="M6 6l12 12M18 6L6 18" />,
    search: <><circle cx="11" cy="11" r="7" /><path d="M21 21l-4.3-4.3" /></>,
    plus: <path d="M12 5v14M5 12h14" />,
    edit: <><path d="M12 20h9" /><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4L16.5 3.5z" /></>,
    trash: <><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2" /><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6" /></>,
    users: <><circle cx="9" cy="8" r="4" /><path d="M2 21c0-4 3-7 7-7s7 3 7 7" /><circle cx="17" cy="7" r="3" /><path d="M22 19c0-3-2-5-5-5" /></>,
    home: <path d="M3 10l9-7 9 7v11a1 1 0 01-1 1h-5v-7h-6v7H4a1 1 0 01-1-1V10z" />,
    chart: <path d="M3 20h18M7 20V10M12 20V4M17 20v-7" />,
    flame: <path d="M12 2c2 4 6 5 6 10a6 6 0 01-12 0c0-3 1-5 3-7 0 2 1 3 2 3 0-2-1-4 1-6z" />,
    grid: <><rect x="3" y="3" width="7" height="7" rx="1" /><rect x="14" y="3" width="7" height="7" rx="1" /><rect x="3" y="14" width="7" height="7" rx="1" /><rect x="14" y="14" width="7" height="7" rx="1" /></>,
    list: <path d="M4 6h16M4 12h16M4 18h16" />,
    bell: <><path d="M6 8a6 6 0 0112 0c0 7 3 9 3 9H3s3-2 3-9" /><path d="M10 21a2 2 0 004 0" /></>,
    settings: <><circle cx="12" cy="12" r="3" /><path d="M12 1v3M12 20v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M1 12h3M20 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1" /></>,
    logout: <><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" /><path d="M16 17l5-5-5-5M21 12H9" /></>,
    filter: <path d="M3 5h18M6 12h12M10 19h4" />,
    download: <path d="M12 3v12M7 10l5 5 5-5M3 21h18" />,
    block: <><circle cx="12" cy="12" r="10" /><path d="M5 5l14 14" /></>,
    unblock: <><circle cx="12" cy="12" r="10" /><path d="M8 12l3 3 5-6" /></>,
    calendar: <><rect x="3" y="5" width="18" height="16" rx="2" /><path d="M16 3v4M8 3v4M3 10h18" /></>,
    book: <path d="M4 4a2 2 0 012-2h12a2 2 0 012 2v16l-4-3-4 3-4-3-4 3V4z" />,
    moon: <path d="M20 14A8 8 0 0110 4a8 8 0 1010 10z" />,
    dumbbell: <path d="M2 12h2M4 8v8M6 6v12M18 6v12M20 8v8M22 12h-2M8 10h8M8 14h8" />,
    sparkle: <path d="M12 2l2 6 6 2-6 2-2 6-2-6-6-2 6-2 2-6zM19 14l.7 2.3L22 17l-2.3.7L19 20l-.7-2.3L16 17l2.3-.7L19 14z" />,
    logs: <><path d="M4 3h10l6 6v12a1 1 0 01-1 1H4a1 1 0 01-1-1V4a1 1 0 011-1z" /><path d="M14 3v6h6M8 13h8M8 17h5" /></>,
    menu: <path d="M4 6h16M4 12h16M4 18h16" />,
  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color}
      strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" style={style}>
      {paths[name]}
    </svg>
  );
}

function Logo({ size = 28, showText = true, color = SAH.colors.primary }) {
  return (
    <div style={{ display: 'inline-flex', alignItems: 'center', gap: 10 }}>
      <svg width={size} height={size} viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="14" fill={color} opacity="0.12" />
        <path d="M9 20 Q9 11, 16 11 Q23 11, 23 16 Q23 21, 16 21 Q12 21, 9 20 Z" fill={color} opacity="0.9" />
        <circle cx="16" cy="16" r="3" fill={SAH.colors.bg} />
        <circle cx="22" cy="10" r="2.5" fill={SAH.colors.streak} />
      </svg>
      {showText && <span style={{ fontFamily: SAH.font.display, fontWeight: 700, fontSize: size * 0.56, color: SAH.colors.text, letterSpacing: '-0.02em' }}>SAH</span>}
    </div>
  );
}

// ─── Design System Docs ───────────────────────────────────────────────────────

const { useState } = React;

function Section({ id, eyebrow, title, lead, children }) {
  const c = SAH.colors;
  return (
    <section id={id} style={{ scrollMarginTop: 24, padding: '64px 0', borderTop: `1px solid ${c.border}` }}>
      <header style={{ display: 'grid', gridTemplateColumns: '180px 1fr', gap: 48, marginBottom: 40, alignItems: 'baseline' }}>
        <div style={{ fontFamily: SAH.font.mono, fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: c.textFaint, paddingTop: 6 }}>
          {eyebrow}
        </div>
        <div>
          <h2 style={{ fontFamily: SAH.font.display, fontSize: 38, fontWeight: 600, letterSpacing: '-0.025em', margin: 0, color: c.text }}>{title}</h2>
          {lead && <p style={{ fontSize: 16, lineHeight: 1.55, color: c.textMuted, marginTop: 12, maxWidth: 620 }}>{lead}</p>}
        </div>
      </header>
      <div style={{ paddingLeft: 228 }}>{children}</div>
    </section>
  );
}

function Subhead({ children, rule }) {
  const c = SAH.colors;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginTop: 40, marginBottom: 18 }}>
      <h3 style={{ fontFamily: SAH.font.display, fontSize: 14, fontWeight: 600, letterSpacing: '0.04em', textTransform: 'uppercase', color: c.text, margin: 0 }}>{children}</h3>
      <div style={{ flex: 1, height: 1, background: c.border }} />
      {rule && <span style={{ fontFamily: SAH.font.mono, fontSize: 11, color: c.textFaint }}>{rule}</span>}
    </div>
  );
}

function Spec({ children }) {
  return (
    <span style={{ fontFamily: SAH.font.mono, fontSize: 11, color: SAH.colors.textFaint, letterSpacing: '0.01em' }}>{children}</span>
  );
}

function CalloutNote({ children }) {
  const c = SAH.colors;
  return (
    <div style={{ background: c.primaryFaint, borderLeft: `3px solid ${c.primary}`, padding: '14px 18px', borderRadius: 4, fontSize: 13.5, lineHeight: 1.55, color: c.text, marginTop: 16 }}>
      {children}
    </div>
  );
}

function Cover() {
  const c = SAH.colors;
  return (
    <div style={{ padding: '88px 0 56px', display: 'grid', gridTemplateColumns: '180px 1fr', gap: 48, alignItems: 'flex-end' }}>
      <div><Logo size={48} /></div>
      <div>
        <div style={{ fontFamily: SAH.font.mono, fontSize: 11, letterSpacing: '0.14em', textTransform: 'uppercase', color: c.textFaint, marginBottom: 18 }}>
          Design System · v1.0 · Mai 2026
        </div>
        <h1 style={{ fontFamily: SAH.font.display, fontSize: 64, fontWeight: 600, letterSpacing: '-0.035em', lineHeight: 1, margin: 0, color: c.text }}>
          SAH<span style={{ color: c.primary }}>.</span> sistema visual<br />
          para acompanhamento<br />
          de hábitos.
        </h1>
        <p style={{ fontSize: 17, lineHeight: 1.6, color: c.textMuted, marginTop: 24, maxWidth: 640 }}>
          Tokens, primitivas e padrões que sustentam a plataforma SAH — desde a tela de login até o painel da Marina. Calma editorial, calor de papel creme, progresso em verde sage, bem-estar em roxo suave, conquistas em dourado.
        </p>
        <div style={{ display: 'flex', gap: 28, marginTop: 36, paddingTop: 20, borderTop: `1px solid ${c.border}`, fontFamily: SAH.font.mono, fontSize: 11, letterSpacing: '0.04em', color: c.textFaint }}>
          <span><strong style={{ color: c.text, fontWeight: 600 }}>32</strong>&nbsp;&nbsp;tokens</span>
          <span><strong style={{ color: c.text, fontWeight: 600 }}>11</strong>&nbsp;&nbsp;primitivas</span>
          <span><strong style={{ color: c.text, fontWeight: 600 }}>34</strong>&nbsp;&nbsp;ícones</span>
          <span><strong style={{ color: c.text, fontWeight: 600 }}>6</strong>&nbsp;&nbsp;famílias de cor</span>
        </div>
      </div>
    </div>
  );
}

function Principles() {
  const c = SAH.colors;
  const items = [
    { n: '01', t: 'Encorajamento, não cobrança', d: 'A interface celebra streaks, suaviza falhas. Erros nunca usam vermelho-alarme; usam um terracota quente. Conquistas usam dourado, não troféus.' },
    { n: '02', t: 'Calma de papel', d: 'O fundo é creme #FAF7F2, não branco. Sombras são morno-marrom translúcido. A interface respira como caderno de hábitos físico.' },
    { n: '03', t: 'Verde como progresso, roxo como pausa', d: 'Verde sage para ações de avanço (concluir, somar, criar). Roxo para reflexão e bem-estar. Dourado reservado a streaks. Sem mistura.' },
    { n: '04', t: 'Densidade humana', d: 'Espaçamento generoso por padrão, com modo compact para a Marina (admin power-user). Toque mínimo 40px; respiro mínimo 16px.' },
  ];
  return (
    <Section id="principles" eyebrow="§ 01 · Princípios" title="Quatro convicções." lead="Antes de qualquer cor ou componente, o sistema responde a estas quatro decisões — elas resolvem 90% das dúvidas de design.">

function DesignSystemDocs() {
  const c = SAH.colors;
  const [active, setActive] = useState('principles');

  React.useEffect(() => {
    const ids = ['principles', 'colors', 'type', 'spacing', 'icons', 'buttons', 'forms', 'badges', 'patterns', 'voice'];
    const onScroll = () => {
      let current = 'principles';
      for (const id of ids) {
        const el = document.getElementById(id);
        if (el && el.getBoundingClientRect().top < 200) current = id;
      }
      setActive(current);
    };
    window.addEventListener('scroll', onScroll);
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  return (
    <div className="sah-app" style={{ background: c.bg, minHeight: '100vh' }}>
      <div style={{ maxWidth: 1240, margin: '0 auto', padding: '0 48px', display: 'grid', gridTemplateColumns: '220px 1fr', gap: 56 }}>
        <IndexNav active={active} />
        <main style={{ paddingBottom: 120 }}>
          <Cover />
          <Principles />
          <Colors />
          <Typography />
          <SpacingShadows />
          <Icons />
          <ButtonsSection />
          <FormsSection />
          <BadgesSection />
          <PatternsSection />
          <Voice />
          <footer style={{ marginTop: 80, paddingTop: 32, borderTop: `1px solid ${c.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontFamily: SAH.font.mono, fontSize: 11, color: c.textFaint, letterSpacing: '0.04em' }}>
            <span>SAH · Sistema de Acompanhamento de Hábitos</span>
            <span>fim do documento · §10 / 10</span>
          </footer>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<DesignSystemDocs />);
